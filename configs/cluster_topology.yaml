# Cluster topology configuration for 16-GPU distributed RLHF
# 2 nodes × 8 GPUs per node (NVIDIA A100 or H100 recommended)

cluster:
  name: "rlhf-cluster-v1"
  num_nodes: 2
  gpus_per_node: 8
  total_gpus: 16
  
  # Node specifications
  nodes:
    - id: 0
      hostname: "node-0"
      gpus: [0, 1, 2, 3, 4, 5, 6, 7]
      memory_gb_per_gpu: 40
      interconnect: "NVLink"
    - id: 1
      hostname: "node-1"
      gpus: [0, 1, 2, 3, 4, 5, 6, 7]
      memory_gb_per_gpu: 40
      interconnect: "NVLink"

# Model placement: asymmetric assignment
models:
  actor:
    model_name: "opt-1.3b"
    num_gpus: 8
    parallelism_strategy: "fsdp_tp"  # FSDP (8-way) + Tensor Parallelism (2-way)
    tp_degree: 2
    dp_degree: 4
    precision: "bfloat16"
    devices: [0, 1, 2, 3, 4, 5, 6, 7]
    node_ids: [0, 1]
    
  critic:
    model_name: "opt-1.3b"
    num_gpus: 4
    parallelism_strategy: "fsdp_tp"  # FSDP (4-way) + Tensor Parallelism
    tp_degree: 1
    dp_degree: 4
    precision: "bfloat16"
    devices: [0, 1, 2, 3]
    node_ids: [0]
    
  reference:
    model_name: "opt-1.3b"
    num_gpus: 2
    parallelism_strategy: "inference"  # Frozen model, replica placement
    tp_degree: 1
    dp_degree: 2
    precision: "float32"  # No gradients needed
    devices: [4, 5]
    node_ids: [0]
    
  reward:
    model_name: "deberta-v3-large"
    num_gpus: 2
    parallelism_strategy: "inference"  # Frozen model, replica placement
    tp_degree: 1
    dp_degree: 2
    precision: "float32"  # No gradients needed
    devices: [6, 7]
    node_ids: [0, 1]

# Communication configuration
communication:
  backend: "nccl"
  init_method: "env://"
  timeout_seconds: 300
  
  # NCCL environment variables
  nccl_env:
    NCCL_DEBUG: "INFO"
    NCCL_DEBUG_SUBSYS: "ALL"
    NCCL_SOCKET_IFNAME: "eth0"
    NCCL_IB_DISABLE: "0"
    NCCL_NET_GDR_LEVEL: "2"
    
  # Collective communication tuning
  collective:
    all_reduce_algorithm: "ring"
    reduce_scatter_algorithm: "ring"
    allgather_algorithm: "recursive_doubling"
    broadcast_algorithm: "tree"
    
  # Overlap configuration
  overlap_comm: true
  overlap_start_proportion: 0.8  # Start comm when 80% of gradients ready

# Training hyperparameters
training:
  learning_rate: 1e-5
  max_grad_norm: 1.0
  ppo_epochs: 4
  ppo_batch_size: 32
  gamma: 0.99
  gae_lambda: 0.95
  kl_target: 0.02
  kl_penalty_coef: 0.02
  value_loss_coef: 0.5
  entropy_coef: 0.01
  
  # Gradient accumulation
  gradient_accumulation_steps: 8
  
  # Checkpoint configuration
  checkpoint_interval: 500
  checkpoint_dir: "/rlhf_checkpoints"
  keep_last_n_checkpoints: 3

# Monitoring and profiling
monitoring:
  enable_telemetry: true
  telemetry_log_dir: "/telemetry_logs"
  telemetry_flush_interval_sec: 10
  
  profile_nccl: true
  profile_memory: true
  memory_log_interval_sec: 60
